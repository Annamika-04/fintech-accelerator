services:

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI App ─────────────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Celery OCR Worker ───────────────────────────────────────────────────────
  worker_ocr:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker -Q ocr -c 2 -l info -n ocr@%h

  # ── Celery Face Worker ──────────────────────────────────────────────────────
  worker_face:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker -Q face -c 2 -l info -n face@%h

  # ── Celery AML Worker ───────────────────────────────────────────────────────
  worker_aml:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker -Q aml -c 2 -l info -n aml@%h

  # ── Celery AI Worker ────────────────────────────────────────────────────────
  worker_ai:
    build: .
    restart: unless-stopped
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A app.tasks.celery_app.celery_app worker -Q ai -c 1 -l info -n ai@%h

  # ── Celery Flower (task monitoring UI) ─────────────────────────────────────
  flower:
    build: .
    restart: unless-stopped
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      - redis
    command: celery -A app.tasks.celery_app.celery_app flower --port=5555
